<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; padding: 16px; background: #f5f5f5; color: #333; }
  h2 { font-size: 18px; margin-bottom: 12px; color: #1a73e8; display: flex; align-items: center; gap: 8px; }
  h3 { font-size: 15px; margin: 16px 0 8px; color: #555; }
  .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .card-header { padding: 10px 14px; font-size: 14px; font-weight: 600; color: #fff; }
  .card-header.blue { background: #1a73e8; }
  .card-header.green { background: #0d904f; }
  .card-header.orange { background: #e8710a; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f0f4f9; padding: 8px 10px; font-size: 12px; text-align: left; color: #555; border-bottom: 2px solid #e0e0e0; }
  td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  .warn { color: #d93025; font-weight: 600; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .tag-ok { background: #e6f4ea; color: #137333; }
  .tag-warn { background: #fce8e6; color: #c5221f; }
  .stats { padding: 14px; }
  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: #777; }
  .stat-value { font-weight: 600; }
  .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:active { background: #1557b0; }
  .btn:disabled { background: #e0e0e0; color: #999; }
  .btn-success { background: #0d904f; color: #fff; }
  .btn-error { background: #d93025; color: #fff; }
  #status { margin-top: 8px; font-size: 13px; text-align: center; padding: 4px; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; border-radius: 11px; background: #1a73e8; color: #fff; font-size: 12px; font-weight: 600; padding: 0 6px; }
</style>
</head>
<body>
<div id="app"><p style="color:#999;text-align:center;padding:40px 0;">載入中...</p></div>

<script>
window.ai_edge_gallery_get_result = async function(inputJson, secret) {
  try {
    const input = JSON.parse(inputJson);
    const data = input.data || [];
    const summary = input.summary || [];
    const action = input.action || 'display';
    const webhookUrl = (secret && secret !== 'skip') ? secret.trim() : null;

    const today = new Date();
    const in30 = new Date(today.getTime() + 30 * 86400000);

    // --- Detail Table ---
    let html = '<h2>📋 食品標籤分析報表</h2>';

    html += '<div class="card"><div class="card-header blue">明細表 <span class="badge">' + data.length + '</span></div>';
    html += '<table><tr><th>#</th><th>品名</th><th>淨重</th><th>有效日期</th><th>狀態</th></tr>';
    data.forEach((item, i) => {
      const exp = parseDate(item.expiry_date);
      const isExpired = exp && exp < today;
      const isExpiring = exp && !isExpired && exp <= in30;
      let statusTag = '<span class="tag tag-ok">正常</span>';
      if (isExpired) statusTag = '<span class="tag tag-warn">已過期</span>';
      else if (isExpiring) statusTag = '<span class="tag tag-warn">即將到期</span>';

      html += '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td><strong>' + esc(item.product_name) + '</strong></td>' +
        '<td>' + esc(item.net_weight) + '</td>' +
        '<td>' + esc(item.expiry_date) + '</td>' +
        '<td>' + statusTag + '</td>' +
        '</tr>';
    });
    html += '</table></div>';

    // --- Summary Table ---
    if (summary.length > 0) {
      html += '<div class="card"><div class="card-header green">按有效日期合計 <span class="badge">' + summary.length + ' 組</span></div>';
      html += '<table><tr><th>有效日期</th><th>數量</th><th>品名</th><th>合計淨重</th></tr>';
      summary.forEach(row => {
        html += '<tr>' +
          '<td><strong>' + esc(row.expiry_date) + '</strong></td>' +
          '<td>' + row.count + '</td>' +
          '<td>' + esc(row.products) + '</td>' +
          '<td>' + esc(row.total_weight) + '</td>' +
          '</tr>';
      });
      html += '</table></div>';
    }

    // --- Stats ---
    const dates = data.map(d => parseDate(d.expiry_date)).filter(Boolean).sort((a,b) => a - b);
    const expiredCount = data.filter(d => { const e = parseDate(d.expiry_date); return e && e < today; }).length;
    const expiringCount = data.filter(d => { const e = parseDate(d.expiry_date); return e && e >= today && e <= in30; }).length;

    html += '<div class="card"><div class="card-header orange">統計摘要</div><div class="stats">';
    html += statRow('總產品數', data.length + ' 項');
    if (dates.length > 0) {
      html += statRow('最近到期', fmt(dates[0]));
      html += statRow('最遠到期', fmt(dates[dates.length - 1]));
    }
    if (expiredCount > 0) html += statRow('⛔ 已過期', '<span class="warn">' + expiredCount + ' 項</span>');
    if (expiringCount > 0) html += statRow('⚠️ 30天內到期', '<span class="warn">' + expiringCount + ' 項</span>');
    const okCount = data.length - expiredCount - expiringCount;
    if (okCount > 0) html += statRow('✅ 狀態正常', okCount + ' 項');
    html += '</div></div>';

    // --- Upload Button ---
    if (action === 'upload' && webhookUrl) {
      html += '<button class="btn btn-primary" id="uploadBtn" onclick="doUpload()">📤 上傳至 Google Sheets</button>';
      html += '<div id="status"></div>';
      window._uploadData = { data: data, summary: summary };
      window._webhookUrl = webhookUrl;
    } else if (action === 'upload' && !webhookUrl) {
      html += '<div style="text-align:center;color:#d93025;padding:12px;font-size:13px;">⚠️ 未設定 Web App URL，無法上傳。請在 secret 欄位輸入你的 Google Apps Script 部署網址。</div>';
    }

    document.getElementById('app').innerHTML = html;

    return JSON.stringify({
      status: 'success',
      total_items: data.length,
      expired: expiredCount,
      expiring_soon: expiringCount,
      message: action === 'upload' && webhookUrl
        ? '報表已產生，請點擊按鈕上傳至 Google Sheets。'
        : '報表已產生完成。'
    });

  } catch (e) {
    document.getElementById('app').innerHTML = '<div style="padding:20px;color:#d93025;">❌ 解析錯誤：' + esc(e.message) + '</div>';
    return JSON.stringify({ status: 'error', message: e.message });
  }
};

async function doUpload() {
  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '⏳ 上傳中...';
  status.textContent = '';

  try {
    await fetch(window._webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(window._uploadData),
      mode: 'no-cors'
    });
    btn.textContent = '✅ 上傳成功';
    btn.className = 'btn btn-success';
    status.textContent = '資料已成功寫入 Google Sheets！';
    status.style.color = '#0d904f';
  } catch (e) {
    btn.textContent = '❌ 上傳失敗，點擊重試';
    btn.className = 'btn btn-error';
    btn.disabled = false;
    status.textContent = '錯誤：' + e.message;
    status.style.color = '#d93025';
  }
}

function parseDate(s) {
  if (!s) return null;
  const d = new Date(s.replace(/\//g, '-'));
  return isNaN(d.getTime()) ? null : d;
}

function fmt(d) {
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}

function statRow(label, value) {
  return '<div class="stat-row"><span class="stat-label">' + label + '</span><span class="stat-value">' + value + '</span></div>';
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
